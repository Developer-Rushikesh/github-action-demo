<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First CI/CD Project</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color:white;
        }

        .container{
            text-align:center;
            background: rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            max-width:700px;
        }

        h1{
            font-size:2.5rem;
            margin-bottom:20px;
            color:#38bdf8;
        }

        p{
            font-size:1.2rem;
            margin-bottom:20px;
            line-height:1.6;
        }

        .badge{
            display:inline-block;
            padding:10px 20px;
            background:#22c55e;
            border-radius:30px;
            font-weight:bold;
            color:white;
        }

        .footer{
            margin-top:25px;
            color:#cbd5e1;
            font-size:14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 GitHub Actions CI/CD Project</h1>

        <p>
            Hello 🎉, I am <strong>Rushi</strong>!
            <br>
            This is my first CI/CD Pipeline project built using
            GitHub Actions, GitHub Pages, HTML and CSS.
        </p>

        <div class="badge">
            ✅ Auto Deployment Enabled
        </div>

        <div class="footer">
            Built with ❤️ by Rushi
        </div>
    </div>

</body>
</html>
